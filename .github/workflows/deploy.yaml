name: CI/CD

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Typecheck, Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the DB_VERSION guard can resolve the commit range
          # of a merge (ADR-0017).
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # ADR-0017: app semver and DB_VERSION version independently, but a schema
      # migration must never ship as a silent patch. If this push changed
      # DB_VERSION, require at least one feat-level commit in the range so
      # semantic-release emits at least a minor bump.
      - name: DB migrations must ship at least a minor release
        run: |
          if git diff HEAD^ HEAD -- src/db/schema.ts \
               | grep -qE '^\+export const DB_VERSION'; then
            if ! git log HEAD^..HEAD --format='%s%n%b' \
                 | grep -qE '^feat(\(.+\))?!?:'; then
              echo "DB_VERSION changed but no feat: commit in range — a migration would ship as a silent patch."
              echo "Use a feat(db): commit for schema migrations."
              exit 1
            fi
          fi
      - run: npm run validate

  coverage:
    name: Publish Coverage Badge
    runs-on: ubuntu-latest
    # Intentionally not in any deploy job's `needs`: a flaky badge push must
    # never block a release. Skips cleanly on forks where the secret is absent.
    if: github.repository == 'megvalcour/shoop-pwa'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Generate coverage
        run: npx vitest run --coverage
      - name: Extract line coverage %
        id: cov
        run: |
          PCT=$(node -p "Math.round(require('./coverage/coverage-summary.json').total.lines.pct)")
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
      - name: Push coverage badge to gist
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: shoop-coverage.json
          label: coverage
          message: ${{ steps.cov.outputs.pct }}%
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 50
          maxColorRange: 90

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [validate, e2e-tests]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for commit-analysis.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the post-release main HEAD so the build reads the freshly
          # bumped package.json (the release job commits the bump with [skip ci],
          # which does not retrigger this workflow). Without this, __APP_VERSION__
          # would lag one release behind the git tag.
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Vite inlines VITE_IMPORT_TOKEN at build time, and this GitHub Actions
      # job — not Cloudflare — runs the build (Direct Upload, see docs/releases.md).
      # The token must therefore be injected here from a repo Actions secret;
      # a VITE_IMPORT_TOKEN set in the Cloudflare build env is a no-op.
      - run: npm run build
        env:
          VITE_IMPORT_TOKEN: ${{ secrets.VITE_IMPORT_TOKEN }}
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=shoop-pwa
