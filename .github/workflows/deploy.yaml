name: CI/CD

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Typecheck, Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the DB_VERSION guard can resolve the commit range
          # of a merge (ADR-0017).
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # ADR-0017: app semver and DB_VERSION version independently, but a schema
      # migration must never ship as a silent patch. If this push changed
      # DB_VERSION, require at least one feat-level commit in the range so
      # semantic-release emits at least a minor bump.
      - name: DB migrations must ship at least a minor release
        run: |
          if git diff HEAD^ HEAD -- src/db/schema.ts \
               | grep -qE '^\+export const DB_VERSION'; then
            if ! git log HEAD^..HEAD --format='%s%n%b' \
                 | grep -qE '^feat(\(.+\))?!?:'; then
              echo "DB_VERSION changed but no feat: commit in range — a migration would ship as a silent patch."
              echo "Use a feat(db): commit for schema migrations."
              exit 1
            fi
          fi
      - run: npm run validate

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [validate, e2e-tests]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for commit-analysis.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the post-release main HEAD so the build reads the freshly
          # bumped package.json (the release job commits the bump with [skip ci],
          # which does not retrigger this workflow). Without this, __APP_VERSION__
          # would lag one release behind the git tag.
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=shoop-pwa
